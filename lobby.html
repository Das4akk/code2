<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COWIO - Авторизация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-loading">
    <canvas id="particle-canvas"></canvas>
    
    <section id="auth-screen" class="screen">
        <div class="auth-wrapper glass-panel">
            <div class="logo">COWIO</div>
            <div class="auth-tabs">
                <button id="tab-login-btn" class="active">Вход</button>
                <button id="tab-reg-btn">Регистрация</button>
            </div>
            
            <div id="login-form" class="auth-form active-form">
                <input type="email" id="login-email" placeholder="Электронная почта">
                <input type="password" id="login-pass" placeholder="Пароль">
                <button class="primary-btn" id="btn-do-login" style="margin-top: 10px;">Войти</button>
            </div>
            
            <div id="reg-form" class="auth-form">
                <input type="text" id="reg-name" placeholder="Отображаемое имя">
                <input type="text" id="reg-username" placeholder="Уникальный @username">
                <input type="email" id="reg-email" placeholder="Электронная почта">
                <input type="password" id="reg-pass" placeholder="Пароль">
                <div class="agreement-wrap">
                    <input type="checkbox" id="reg-agreement">
                    <label for="reg-agreement">Я принимаю условия соглашения</label>
                </div>
                <button class="primary-btn" id="btn-do-reg" style="margin-top: 10px;">Создать аккаунт</button>
            </div>
        </div>
    </section>

    <div id="toast-container"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
