<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COW — Co-Watching Space</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="loader" class="loader-overlay active">
        <div class="spinner"></div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div id="app-container">
        <section id="auth-screen" class="screen">
            <div class="auth-wrapper glass-panel">
                <h1 class="logo">COW</h1>
                
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Вход</button>
                    <button id="tab-register">Регистрация</button>
                </div>

                <div class="form-container">
                    <div id="form-login" class="auth-form active-form">
                        <input type="email" id="login-email" placeholder="Email">
                        <input type="password" id="login-password" placeholder="Пароль">
                        <button id="btn-login-email" class="primary-btn">Войти в систему</button>
                    </div>

                    <div id="form-register" class="auth-form hidden-form right">
                        <input type="text" id="reg-name" placeholder="Ваш никнейм">
                        <input type="email" id="reg-email" placeholder="Email">
                        <input type="password" id="reg-password" placeholder="Пароль">
                        <button id="btn-register-email" class="primary-btn">Создать аккаунт</button>
                    </div>
                </div>

                <div class="divider"><span>или</span></div>
                <button id="btn-google-auth" class="google-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="white" style="margin-right: 8px;"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Войти через Google
                </button>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <div class="lobby-layout">
                <aside class="lobby-sidebar glass-panel">
                    <div class="user-profile">
                        <div id="user-avatar" class="avatar-circle"></div>
                        <h3 id="user-display-name">Загрузка...</h3>
                    </div>
                    <nav class="sidebar-nav">
                        <button class="nav-item active">Лента комнат</button>
                        <button class="nav-item">Мои подписки</button>
                    </nav>
                    <button id="btn-logout" class="logout-link">Выйти из системы</button>
                </aside>

                <main class="lobby-main">
                    <header class="main-header glass-panel">
                        <input type="text" id="search-rooms" placeholder="Найти комнату...">
                        <button id="btn-open-create" class="primary-btn create-btn">+ Создать</button>
                    </header>
                    
                    <div id="rooms-grid" class="rooms-grid">
                        </div>
                </main>
            </div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
