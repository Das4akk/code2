<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>COW — Co-Watching Space</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div id="toast-container"></div>
    <div id="remote-audio-container" style="display: none;"></div>

    <div id="app-container">
        <section id="auth-screen" class="screen active">
            <div class="auth-wrapper glass-panel">
                <h1 class="logo">COW</h1>
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Вход</button>
                    <button id="tab-register">Регистрация</button>
                </div>
                <div class="form-container">
                    <div id="form-login" class="auth-form active-form">
                        <input type="email" id="login-email" placeholder="Email">
                        <input type="password" id="login-password" placeholder="Пароль">
                        <button id="btn-login-email" class="primary-btn">Войти</button>
                    </div>
                    <div id="form-register" class="auth-form">
                        <input type="text" id="reg-name" placeholder="Ваше имя">
                        <input type="email" id="reg-email" placeholder="Email">
                        <input type="password" id="reg-password" placeholder="Пароль">
                        <button id="btn-register-email" class="primary-btn">Создать</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <header class="lobby-header glass-panel">
                <div class="user-profile-trigger" id="open-profile-btn">
                    <div class="avatar-mini" id="my-avatar-preview"></div>
                    <div class="user-info">
                        <span id="my-display-name">Загрузка...</span>
                        <small id="my-status-preview">Online</small>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="btn-open-modal" class="icon-btn">Создать комнату</button>
                    <button id="btn-logout" class="secondary-btn">Выйти</button>
                </div>
            </header>
            <main class="lobby-layout">
                <div class="rooms-grid" id="rooms-list"></div>
            </main>
        </section>

        <section id="room-screen" class="screen">
            <div class="room-container">
                <div class="video-side">
                    <div class="video-wrapper glass-panel">
                        <video id="main-player" playsinline></video>
                        <div id="video-placeholder">Ожидание потока...</div>
                    </div>
                    <div class="video-controls glass-panel">
                        <button id="btn-play-pause">⏯</button>
                        <input type="range" id="video-progress" value="0">
                        <button id="btn-fullscreen">⛶</button>
                        <div class="reactions">
                            <button class="react-btn" data-emoji="❤️">❤️</button>
                            <button class="react-btn" data-emoji="👏">👏</button>
                            <button class="react-btn" data-emoji="🔥">🔥</button>
                        </div>
                    </div>
                </div>

                <div class="chat-side glass-panel">
                    <div class="chat-tabs">
                        <button id="tab-chat-btn" class="active">Чат</button>
                        <button id="tab-users-btn">Люди (<span id="users-count">0</span>)</button>
                    </div>
                    <div id="chat-messages" class="chat-area active"></div>
                    <div id="users-list" class="users-area" style="display:none;"></div>
                    
                    <div class="chat-input-wrapper">
                        <button id="mic-btn" class="mic-btn">🎤</button>
                        <input type="text" id="chat-input" placeholder="Сообщение...">
                        <button id="send-btn">↑</button>
                    </div>
                    <button id="btn-leave-room" class="leave-btn">Выход</button>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-profile" class="modal-overlay">
        <div class="modal-content glass-panel">
            <h2>Профиль</h2>
            <input type="text" id="edit-display-name" placeholder="Имя">
            <input type="text" id="edit-status-text" placeholder="Статус">
            <input type="color" id="edit-name-color" title="Цвет ника">
            <textarea id="edit-bio" placeholder="О себе..."></textarea>
            <div class="modal-actions">
                <button id="btn-save-profile" class="primary-btn">Сохранить</button>
                <button id="btn-close-profile" class="secondary-btn">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="modal-create" class="modal-overlay">
        <div class="modal-content glass-panel">
            <h2 id="modal-create-title">Новая комната</h2>
            <input type="text" id="room-name" placeholder="Название">
            <input type="password" id="room-password" placeholder="Пароль (опц)">
            <div class="modal-actions">
                <button id="btn-confirm-create" class="primary-btn">Создать</button>
                <button id="btn-close-modal" class="secondary-btn">Отмена</button>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
