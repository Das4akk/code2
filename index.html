<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>COW — Co-Watching Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    
    <div id="toast-container"></div>
    <div id="online-counter" class="online-counter" style="display:none;">
        <span id="online-count">1</span> онлайн
    </div>
    <div id="remote-audio-container" style="display: none;"></div>

    <div id="app-container">
        <!-- АВТОРИЗАЦИЯ -->
        <section id="auth-screen" class="screen active">
            <div class="auth-wrapper glass-panel">
                <h1 class="logo">COW</h1>
                <div class="auth-tabs">
                    <button type="button" id="tab-login" class="active">Вход</button>
                    <button type="button" id="tab-register">Регистрация</button>
                </div>
                <div class="form-container">
                    <form id="form-login" class="auth-form active-form" onsubmit="return false;">
                        <input type="email" id="login-email" placeholder="Email" autocomplete="username">
                        <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password">
                        <button type="submit" id="btn-login" class="primary-btn">Войти</button>
                    </form>
                    <form id="form-register" class="auth-form" onsubmit="return false;">
                        <input type="text" id="reg-name" placeholder="Ваше имя" autocomplete="name">
                        <input type="email" id="reg-email" placeholder="Email" autocomplete="username">
                        <input type="password" id="reg-password" placeholder="Пароль (6+ симв.)" autocomplete="new-password">
                        <button type="submit" id="btn-register" class="primary-btn">Создать аккаунт</button>
                    </form>
                </div>
                <div class="divider"><span>или</span></div>
                <button type="button" id="btn-google" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="G" width="18">
                    Войти через Google
                </button>
            </div>
        </section>

        <!-- ЛОББИ -->
        <section id="lobby-screen" class="screen">
            <header class="lobby-header">
                <div class="user-profile-brief" id="open-profile-btn">
                    <div id="my-avatar-preview" class="avatar-circle">?</div>
                    <div class="user-info">
                        <span id="my-name-display">Загрузка...</span>
                        <small id="my-status-display">В сети</small>
                    </div>
                </div>
                <div class="header-actions">
                    <button type="button" id="btn-open-modal" class="icon-btn">✚ Создать комнату</button>
                    <button type="button" id="btn-logout" class="icon-btn logout">Выход</button>
                </div>
            </header>
            <main class="lobby-layout">
                <div class="search-bar">
                    <input type="text" id="room-search" placeholder="Поиск комнат...">
                </div>
                <div id="rooms-grid" class="rooms-grid"></div>
            </main>
        </section>

        <!-- КОМНАТА -->
        <section id="room-screen" class="screen">
            <header class="room-header">
                <button type="button" id="btn-leave-room" class="back-btn">← Выйти</button>
                <h2 id="current-room-title">Комната</h2>
                <div id="room-controls"></div>
            </header>
            <main class="room-layout">
                <div class="video-column">
                    <div class="video-container glass-panel">
                        <div id="video-player-root"></div>
                    </div>
                </div>
                <div class="chat-column glass-panel">
                    <div class="chat-tabs">
                        <button type="button" id="tab-chat-btn" class="active">💬 Чат</button>
                        <button type="button" id="tab-users-btn">👥 Люди (<span id="users-count">0</span>)</button>
                    </div>
                    <div class="chat-area active-area" id="chat-messages"></div>
                    <div class="users-area" id="users-list" style="display: none;"></div>
                    <div class="message-dock">
                        <div class="beautiful-chat-input glass-panel">
                            <button type="button" id="mic-btn" class="mic-icon-btn">🎤</button>
                            <input type="text" id="chat-input" placeholder="Сообщение..." autocomplete="off">
                            <button type="button" id="send-btn" class="send-btn">↑</button>
                        </div>
                    </div>
                </div>
            </main>
        </section>
    </div>

    <!-- МОДАЛКИ -->
    <div id="modal-profile" class="modal">
        <div class="modal-content glass-panel">
            <h3>Профиль</h3>
            <input type="text" id="edit-name" placeholder="Имя">
            <input type="text" id="edit-status" placeholder="Статус">
            <input type="color" id="edit-color" value="#ffffff">
            <div class="modal-actions">
                <button type="button" id="btn-save-profile" class="primary-btn">Сохранить</button>
                <button type="button" class="secondary-btn" onclick="document.getElementById('modal-profile').classList.remove('active')">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="modal-create" class="modal">
        <form class="modal-content glass-panel" onsubmit="return false;">
            <h3>Создать комнату</h3>
            <input type="text" id="room-name" placeholder="Название">
            <input type="text" id="room-link" placeholder="Ссылка на видео">
            <label class="checkbox-container"> Приватная <input type="checkbox" id="room-private"> </label>
            <input type="password" id="room-password" placeholder="Пароль" style="display:none;" autocomplete="new-password">
            <div class="modal-actions">
                <button type="button" id="btn-create-confirm" class="primary-btn">Запустить</button>
                <button type="button" id="btn-close-modal" class="secondary-btn" onclick="document.getElementById('modal-create').classList.remove('active')">Отмена</button>
            </div>
        </form>
    </div>

    <div id="modal-join-auth" class="modal">
        <form class="modal-content glass-panel" onsubmit="return false;">
            <h3>Пароль</h3>
            <input type="password" id="join-password" placeholder="Пароль" autocomplete="current-password">
            <div class="modal-actions">
                <button type="button" id="btn-join-confirm" class="primary-btn">Войти</button>
                <button type="button" class="secondary-btn btn-close-modal" onclick="document.getElementById('modal-join-auth').classList.remove('active')">Отмена</button>
            </div>
        </form>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
