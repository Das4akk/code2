<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COW — Co-Watching</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div id="loader" class="loader-overlay active"><div class="spinner"></div></div>
    <canvas id="particle-canvas"></canvas>

    <div id="app-container">
        <section id="auth-screen" class="screen">
            <div class="auth-wrapper glass-panel">
                <h1 class="logo">COW</h1>
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Вход</button>
                    <button id="tab-register">Регистрация</button>
                </div>
                <div id="form-login" class="auth-form active">
                    <input type="email" id="login-email" placeholder="Email">
                    <input type="password" id="login-password" placeholder="Пароль">
                    <button id="btn-login-email" class="primary-btn">Войти</button>
                </div>
                <div id="form-register" class="auth-form hidden">
                    <input type="text" id="reg-name" placeholder="Никнейм">
                    <input type="email" id="reg-email" placeholder="Email">
                    <input type="password" id="reg-password" placeholder="Пароль">
                    <button id="btn-register-email" class="primary-btn">Создать аккаунт</button>
                </div>
                <div class="divider"><span>или</span></div>
                <button id="btn-google-auth" class="google-btn">Войти через Google</button>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <div class="lobby-layout">
                <aside class="lobby-sidebar glass-panel">
                    <div class="user-profile">
                        <div class="avatar-circle"></div>
                        <h3 id="user-display-name">...</h3>
                    </div>
                    <nav class="sidebar-nav">
                        <button class="nav-item active">Все комнаты</button>
                    </nav>
                    <button id="btn-logout" class="logout-link">Выйти</button>
                </aside>
                <main class="lobby-main">
                    <header class="main-header glass-panel">
                        <input type="text" id="search-rooms" placeholder="Поиск...">
                        <button id="btn-open-modal" class="primary-btn create-btn">+ Создать</button>
                    </header>
                    <div id="rooms-grid" class="rooms-grid"></div>
                </main>
            </div>
        </section>

        <section id="room-screen" class="screen">
            <div class="room-container">
                <div class="video-side glass-panel">
                    <div class="room-nav">
                        <button id="btn-leave-room" class="icon-btn">←</button>
                        <h2 id="current-room-name">Загрузка...</h2>
                        <span id="admin-label" class="badge hidden">ADMIN</span>
                    </div>
                    <div id="player-container"></div>
                    <div id="player-blocker" class="hidden"></div>
                </div>
                <div class="chat-side glass-panel">
                    <div class="online-bar">В сети: <span id="online-count">0</span></div>
                    <div id="chat-messages"></div>
                    <div class="chat-input-wrapper">
                        <button id="btn-mic" class="mic-btn mic-off">🎤</button>
                        <input type="text" id="chat-input" placeholder="Написать...">
                        <button id="btn-send-msg" class="send-btn">➤</button>
                    </div>
                </div>
            </div>
        </section>

        <div id="modal-create" class="modal-overlay">
            <div class="modal-content glass-panel">
                <h2>Создать комнату</h2>
                <input type="text" id="room-name" placeholder="Название">
                <input type="text" id="room-link" placeholder="YouTube или прямая ссылка">
                <input type="password" id="room-pass" placeholder="Пароль (опционально)">
                <div class="modal-buttons">
                    <button id="btn-close-modal" class="google-btn">Отмена</button>
                    <button id="btn-create-finish" class="primary-btn">Запустить</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
