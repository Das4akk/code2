<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>COW — Co-Watching Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    
    <div id="toast-container"></div>
    
    <div id="online-counter" class="online-counter" style="display:none;">
        <span id="online-count">1</span> онлайн
    </div>

    <div id="remote-audio-container" style="display: none;"></div>

    <div id="app-container">
        
        <section id="auth-screen" class="screen active">
            <div class="auth-wrapper glass-panel">
                <h1 class="logo">COW</h1>
                <div class="auth-tabs">
                    <button type="button" id="tab-login" class="active">Вход</button>
                    <button type="button" id="tab-register">Регистрация</button>
                </div>
                
                <div class="form-container">
                    <div id="form-login" class="auth-form active-form">
                        <input type="email" id="login-email" placeholder="Электронная почта" autocomplete="email">
                        <input type="password" id="login-password" placeholder="Пароль">
                        <button id="btn-login" class="primary-btn">Войти</button>
                    </div>
                    <div id="form-register" class="auth-form">
                        <input type="text" id="reg-name" placeholder="Как вас зовут?" autocomplete="name">
                        <input type="email" id="reg-email" placeholder="Email" autocomplete="email">
                        <input type="password" id="reg-password" placeholder="Пароль (6+ символов)">
                        <button id="btn-register" class="primary-btn">Создать аккаунт</button>
                    </div>
                </div>

                <div class="divider"><span>или</span></div>
                <button id="btn-google" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google" width="18">
                    Войти через Google
                </button>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <header class="lobby-header">
                <div class="user-profile-brief" id="open-profile-btn">
                    <div id="my-avatar-preview" class="avatar-circle">?</div>
                    <div class="user-info">
                        <span id="my-name-display">Загрузка...</span>
                        <small id="my-status-display">В сети</small>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="btn-open-modal" class="icon-btn">✚ Создать комнату</button>
                    <button id="btn-logout" class="icon-btn logout">Выход</button>
                </div>
            </header>

            <main class="lobby-layout">
                <div class="search-bar">
                    <input type="text" id="room-search" placeholder="Поиск комнат по названию или автору...">
                </div>
                <div id="rooms-grid" class="rooms-grid">
                    </div>
            </main>
        </section>

        <section id="room-screen" class="screen">
            <header class="room-header">
                <button id="btn-leave-room" class="back-btn">← Выйти</button>
                <h2 id="current-room-title">Загрузка комнаты...</h2>
                <div id="room-controls">
                    </div>
            </header>

            <main class="room-layout">
                <div class="video-column">
                    <div class="video-container glass-panel">
                        <div id="video-player-root"></div>
                    </div>
                </div>

                <div class="chat-column glass-panel">
                    <div class="chat-tabs">
                        <button id="tab-chat-btn" class="active">💬 Чат</button>
                        <button id="tab-users-btn">👥 Люди</button>
                    </div>
                    
                    <div class="chat-area active-area" id="chat-messages"></div>
                    <div class="users-area" id="users-list" style="display: none;"></div>

                    <div class="message-dock">
                        <div class="beautiful-chat-input glass-panel">
                            <button id="mic-btn" class="mic-icon-btn" title="Микрофон">🎤</button>
                            <input type="text" id="chat-input" placeholder="Написать в чат...">
                            <button id="send-btn" class="send-btn">↑</button>
                        </div>
                    </div>
                </div>
            </main>
        </section>
    </div>

    <div id="modal-profile" class="modal">
        <div class="modal-content glass-panel">
            <h3>Ваш профиль</h3>
            <div class="profile-edit-fields">
                <label>Имя пользователя</label>
                <input type="text" id="edit-name">
                <label>Статус</label>
                <input type="text" id="edit-status">
                <label>Цвет профиля</label>
                <input type="color" id="edit-color" value="#f5f7fa">
            </div>
            <div class="modal-actions">
                <button id="btn-save-profile" class="primary-btn">Сохранить</button>
                <button type="button" class="secondary-btn" onclick="this.closest('.modal').classList.remove('active')">Отмена</button>
            </div>
        </div>
    </div>

    <div id="modal-create" class="modal">
        <div class="modal-content glass-panel">
            <h3>Создать комнату</h3>
            <div class="create-fields">
                <input type="text" id="room-name" placeholder="Название (например: Mad Frenzy Room)">
                <input type="text" id="room-link" placeholder="Ссылка на YouTube или видео">
                <label class="checkbox-container">
                    Приватная комната
                    <input type="checkbox" id="room-private">
                    <span class="checkmark"></span>
                </label>
                <input type="password" id="room-password" placeholder="Придумайте пароль" style="display:none;">
            </div>
            <div class="modal-actions">
                <button id="btn-create-confirm" class="primary-btn">Запустить</button>
                <button type="button" class="secondary-btn" onclick="this.closest('.modal').classList.remove('active')">Отмена</button>
            </div>
        </div>
    </div>

    <div id="modal-join-auth" class="modal">
        <div class="modal-content glass-panel">
            <h3>Вход ограничен</h3>
            <p>Введите пароль от комнаты:</p>
            <input type="password" id="join-password" placeholder="Пароль">
            <div class="modal-actions">
                <button id="btn-join-confirm" class="primary-btn">Войти</button>
                <button type="button" class="secondary-btn" onclick="this.closest('.modal').classList.remove('active')">Назад</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
