<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COW — Co-Watching Space</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="loader" class="loader-overlay active"><div class="spinner"></div></div>
    <canvas id="particle-canvas"></canvas>

    <div id="app-container">
        <section id="auth-screen" class="screen">
            <div class="auth-wrapper glass-panel">
                <h1 class="logo">COW</h1>
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Вход</button>
                    <button id="tab-register">Регистрация</button>
                </div>
                <div class="form-container">
                    <div id="form-login" class="auth-form active-form">
                        <input type="email" id="login-email" placeholder="Email">
                        <input type="password" id="login-password" placeholder="Пароль">
                        <button id="btn-login-email" class="primary-btn">Войти</button>
                    </div>
                    <div id="form-register" class="auth-form hidden-form right">
                        <input type="text" id="reg-name" placeholder="Никнейм">
                        <input type="email" id="reg-email" placeholder="Email">
                        <input type="password" id="reg-password" placeholder="Пароль">
                        <button id="btn-register-email" class="primary-btn">Создать аккаунт</button>
                    </div>
                </div>
                <div class="divider"><span>или</span></div>
                <button id="btn-google-auth" class="google-btn">Войти через Google</button>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <div class="lobby-layout">
                <aside class="lobby-sidebar glass-panel">
                    <div class="user-profile">
                        <div class="avatar-circle"></div>
                        <h3 id="user-display-name">...</h3>
                    </div>
                    <nav class="sidebar-nav">
                        <button class="nav-item active">Все комнаты</button>
                    </nav>
                    <button id="btn-logout" class="logout-link">Выход</button>
                </aside>

                <main class="lobby-main">
                    <header class="main-header glass-panel">
                        <input type="text" id="search-rooms" placeholder="Поиск...">
                        <button id="btn-open-modal" class="primary-btn create-btn">+ Создать</button>
                    </header>
                    <div id="rooms-grid" class="rooms-grid"></div>
                </main>
            </div>
        </section>

        <div id="modal-create" class="modal">
            <div class="modal-content glass-panel">
                <h2>Создать комнату</h2>
                <input type="text" id="room-name" placeholder="Название комнаты">
                <input type="text" id="room-link" placeholder="Ссылка на видео (YouTube/Direct)">
                <input type="password" id="room-pass" placeholder="Пароль (необязательно)">
                <div class="modal-buttons">
                    <button id="btn-close-modal" class="google-btn">Отмена</button>
                    <button id="btn-create-finish" class="primary-btn">Запустить</button>
                </div>
            </div>
        </div>

        <section id="room-screen" class="screen">
            <header class="room-header glass-panel">
                <button id="btn-leave-room" class="google-btn leave-btn">← В лобби</button>
                <h2 id="room-title-text" style="margin-left: 20px;">Название комнаты</h2>
            </header>
            
            <main class="main-layout-room">
                <div class="video-column">
                    <div class="player-container glass-panel">
                        <video id="native-player" playsinline></video>
                    </div>
                </div>
                <div class="chat-column glass-panel">
                    <div class="chat-area" id="chat-messages"></div>
                    <div class="message-dock">
                        <div class="beautiful-chat-input glass-panel">
                            <button id="mic-btn" class="mic-icon-btn">🎤</button>
                            <input type="text" id="chat-input" placeholder="Написать..." autocomplete="off">
                            <button id="send-btn" class="send-btn">↑</button>
                        </div>
                    </div>
                </div>
            </main>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
