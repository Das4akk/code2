<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Co-Watch | Live Voice</title>
    <link rel="stylesheet" href="style.css?v=12">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <section id="auth-screen" class="screen active">
        <div class="auth-box">
            <div class="auth-logo">CO<span>W</span></div>
            <div class="input-wrapper glass">
                <input type="text" id="username-input" placeholder="Никнейм" autocomplete="off">
            </div>
            <button id="login-btn" class="primary-btn">Войти</button>
        </div>
    </section>

    <section id="main-app" class="screen">
        <main class="main-layout">
            <div class="video-column">
                <div class="player-container glass-player">
                    <video id="native-player" controls playsinline>
                        <source src="https://www.dropbox.com/scl/fi/w6ne3u4cu0etalghat2p9/Doktor_Strendzh_2016_720-kinovasek.net.mp4?rlkey=zt2j541gmovz2bodz94t3dse5&st=tt9m2hw8&raw=1" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="chat-column glass-chat">
                <div class="chat-area" id="chat-messages"></div>
                <div class="message-dock">
                    <div class="beautiful-chat-input glass">
                        <button id="mic-btn" class="mic-icon-btn">🎤</button>
                        <input type="text" id="chat-input" placeholder="Написать..." autocomplete="off">
                        <button id="send-btn" class="send-btn">↑</button>
                    </div>
                </div>
            </div>
        </main>
    </section>

    <script type="module" src="app.js?v=12"></script>
</body>
</html>
