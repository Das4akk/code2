<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>COW — Liquid Glass</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div id="toast-container"></div>
    <div id="remote-audio-container" style="display: none;"></div>

    <div id="app-container">
        <aside id="sidebar-friends" class="glass-panel">
            <div class="sidebar-header">
                <h3>Друзья</h3>
            </div>
            <div id="friends-list-container"></div>
        </aside>

        <section id="auth-screen" class="screen active">
            <div class="auth-wrapper glass-panel">
                <h1 class="logo">COW</h1>
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Вход</button>
                    <button id="tab-register">Регистрация</button>
                </div>
                <div class="form-container">
                    <div id="form-login" class="auth-form active-form">
                        <input type="email" id="login-email" placeholder="Email">
                        <input type="password" id="login-password" placeholder="Пароль">
                        <button id="btn-login-email" class="primary-btn">Войти</button>
                    </div>
                    <div id="form-register" class="auth-form">
                        <input type="text" id="reg-name" placeholder="Имя">
                        <input type="email" id="reg-email" placeholder="Email">
                        <input type="password" id="reg-password" placeholder="Пароль">
                        <button id="btn-register-email" class="primary-btn">Создать аккаунт</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <header class="lobby-header glass-panel">
                <div class="user-profile-brief" id="open-profile-btn">
                    <div class="avatar-container">
                        <img id="my-avatar-preview" src="https://via.placeholder.com/40" alt="Avatar">
                    </div>
                    <span id="my-name-display">Загрузка...</span>
                </div>
                <div class="header-actions">
                    <button id="btn-quick-room" class="secondary-btn">🎲 Рандом</button>
                    <button id="btn-open-modal" class="primary-btn">Создать комнату</button>
                    <button id="btn-logout" class="icon-btn">🚪</button>
                </div>
            </header>

            <main class="lobby-layout">
                <div class="rooms-section">
                    <div class="section-title">
                        <h2>Все комнаты</h2>
                        <div class="room-filters">
                            <span class="filter active">Популярные</span>
                            <span class="filter">Недавние</span>
                        </div>
                    </div>
                    <div id="rooms-grid" class="rooms-grid"></div>
                </div>
            </main>
            
            <div id="global-stats">Сейчас онлайн: <span id="global-online-count">0</span></div>
        </section>

        <section id="room-screen" class="screen">
            <div class="room-container">
                <div class="player-column">
                    <div id="player-wrapper" class="glass-panel">
                        <video id="main-player" playsinline></video>
                        <div id="reaction-layer"></div>
                    </div>
                    <div class="room-controls glass-panel">
                        <button class="react-btn" data-emoji="❤️">❤️</button>
                        <button class="react-btn" data-emoji="😂">😂</button>
                        <button class="react-btn" data-emoji="👍">👍</button>
                        <button id="btn-fullscreen" class="icon-btn">⛶</button>
                    </div>
                </div>
                
                <div class="chat-column glass-panel">
                    <div class="chat-tabs">
                        <button id="tab-chat-btn" class="active">Чат</button>
                        <button id="tab-users-btn">Люди (<span id="users-count">0</span>)</button>
                    </div>
                    <div class="chat-area active-area" id="chat-messages"></div>
                    <div class="users-area" id="users-list" style="display: none;"></div>
                    <div class="message-dock">
                        <div class="beautiful-chat-input glass-panel">
                            <button id="mic-btn" class="mic-icon-btn">🎤</button>
                            <input type="text" id="chat-input" placeholder="Сообщение...">
                            <button id="send-btn" class="send-btn">↑</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-profile" class="modal">
        <div class="modal-content glass-panel">
            <h2>Редактор профиля</h2>
            <div class="edit-profile-grid">
                <div class="edit-avatar-section">
                    <div class="avatar-big-container">
                        <img id="edit-avatar-img" src="" alt="Avatar">
                    </div>
                    <input type="file" id="input-avatar-file" hidden accept="image/*">
                    <button onclick="$('input-avatar-file').click()" class="secondary-btn">Сменить фото</button>
                </div>
                <div class="edit-info-section">
                    <label>Имя</label>
                    <input type="text" id="edit-display-name">
                    
                    <label>Статус (Emoji + Текст)</label>
                    <input type="text" id="edit-status-text" placeholder="Напр: 🍿 Смотрю кино">
                    
                    <label>Цвет ника</label>
                    <input type="color" id="edit-name-color" value="#ffffff">
                    
                    <label>О себе (Bio)</label>
                    <textarea id="edit-bio" maxlength="120"></textarea>
                    
                    <label>Громкость голоса (по умолчанию)</label>
                    <input type="range" id="edit-default-volume" min="0" max="1" step="0.1">
                </div>
            </div>
            <div class="modal-buttons">
                <button id="btn-save-profile" class="primary-btn">Сохранить</button>
                <button id="btn-close-profile" class="secondary-btn">Отмена</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
