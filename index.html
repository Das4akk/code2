<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COW - Cinema Online Watching</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div id="app-container">
        <section id="auth-screen" class="screen active">
            <div class="auth-card glass-panel">
                <h1 class="logo">COW</h1>
                
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Вход</button>
                    <button id="tab-register">Регистрация</button>
                </div>

                <div id="form-login">
                    <input type="email" id="login-email" placeholder="Email">
                    <input type="password" id="login-password" placeholder="Пароль">
                    <button id="btn-login-email" class="primary-btn">Войти</button>
                </div>

                <div id="form-register" class="hidden">
                    <input type="text" id="reg-name" placeholder="Ваше имя">
                    <input type="email" id="reg-email" placeholder="Email">
                    <input type="password" id="reg-password" placeholder="Пароль">
                    <button id="btn-register-email" class="primary-btn">Создать аккаунт</button>
                </div>

                <div class="divider"><span>или</span></div>
                <button id="btn-google-auth" class="google-btn">Войти через Google</button>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <div class="lobby-container glass-panel">
                <header class="lobby-header">
                    <h2 id="user-display-name">Загрузка...</h2>
                    <button id="btn-logout" class="secondary-btn">Выход</button>
                </header>
                <div class="room-controls">
                    <input type="text" id="room-input" placeholder="ID комнаты">
                    <button id="btn-join-room" class="primary-btn">Войти</button>
                    <button id="btn-create-room" class="primary-btn">Создать комнату</button>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
