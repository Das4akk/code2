<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Co-Watch | Ultra Rave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <section id="auth-screen" class="screen active">
        <div class="auth-box">
            <div class="auth-logo">CO<span>W</span></div>
            <h1>Shared Cinema</h1>
            
            <div class="avatar-grid">
                <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Felix" class="av-item active" data-av="Felix">
                <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Aneka" class="av-item" data-av="Aneka">
                <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Casper" class="av-item" data-av="Casper">
                <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Milo" class="av-item" data-av="Milo">
            </div>

            <div class="input-wrapper glass">
                <input type="text" id="username-input" placeholder="Никнейм" autocomplete="off">
            </div>
            <button id="login-btn" class="primary-btn pulse-white">Войти в комнату</button>
        </div>
    </section>

    <section id="main-app" class="screen">
        <header class="app-header glass">
            <div class="room-info">
                <h2 id="current-title">1 сезон 1 серия</h2>
                <div id="status" class="live-indicator"><span></span> Live Sync</div>
            </div>
        </header>

        <main class="main-layout">
            <div class="video-column">
                <div class="episode-list">
                    <button class="ep-btn active glass-btn" data-mp4="https://www.dropbox.com/scl/fi/is8mv6swhjln0rgcxcdu7/s01e01_1080.mp4?rlkey=2l9ox7mwbexyauki8jzyj8ymx&st=31w6hepc&raw=1">1 серия</button>
                    <button class="ep-btn glass-btn" data-mp4="https://www.dropbox.com/scl/fi/is8mv6swhjln0rgcxcdu7/s01e01_1080.mp4?rlkey=2l9ox7mwbexyauki8jzyj8ymx&st=31w6hepc&raw=1">2 серия</button>
                </div>
                <div class="player-container glass-player">
                    <video id="native-player" controls playsinline>
                        <source src="https://www.dropbox.com/scl/fi/is8mv6swhjln0rgcxcdu7/s01e01_1080.mp4?rlkey=2l9ox7mwbexyauki8jzyj8ymx&st=31w6hepc&raw=1" type="video/mp4">
                    </video>
                    <div id="player-shutter"></div>
                </div>
            </div>

            <div class="chat-column glass-chat">
                <div class="chat-header">Чат комнаты</div>
                <div class="chat-area" id="chat-messages"></div>
                
                <div id="sticker-panel" class="sticker-popup glass">
                    <div class="sticker-grid">
                        <img src="https://cdn-icons-png.flaticon.com/512/4117/4117961.png" class="st-item" data-st="heart">
                        <img src="https://cdn-icons-png.flaticon.com/512/4117/4117951.png" class="st-item" data-st="wow">
                        <img src="https://cdn-icons-png.flaticon.com/512/4117/4117947.png" class="st-item" data-st="cry">
                        <img src="https://cdn-icons-png.flaticon.com/512/1791/1791330.png" class="st-item" data-st="popcorn">
                    </div>
                </div>

                <div class="message-dock">
                    <div class="input-dock-wrapper glass">
                        <button id="open-stickers" class="icon-btn">😊</button>
                        <input type="text" id="chat-input" placeholder="Написать..." autocomplete="off">
                        <button id="send-btn" class="send-btn">↑</button>
                    </div>
                </div>
            </div>
        </main>
    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
