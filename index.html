<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COW — Monochrome Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader-overlay active"><div class="spinner"></div></div>
    <canvas id="particle-canvas"></canvas>

    <div id="app-container">
        <section id="auth-screen" class="screen">
            <div class="auth-card glass-panel">
                <h1 class="logo">COW</h1>
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Вход</button>
                    <button id="tab-register">Регистрация</button>
                </div>
                <div class="auth-forms">
                    <div id="form-login" class="auth-group active">
                        <input type="email" id="login-email" placeholder="Email">
                        <input type="password" id="login-password" placeholder="Пароль">
                        <button id="btn-login-email" class="dark-btn">Войти</button>
                    </div>
                    <div id="form-register" class="auth-group hidden">
                        <input type="text" id="reg-name" placeholder="Никнейм">
                        <input type="email" id="reg-email" placeholder="Email">
                        <input type="password" id="reg-password" placeholder="Пароль">
                        <button id="btn-register-email" class="dark-btn">Создать</button>
                    </div>
                </div>
                <button id="btn-google-auth" class="outline-btn">Google</button>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <div class="lobby-container">
                <header class="lobby-header glass-panel">
                    <div class="user-info">
                        <div class="mini-avatar"></div>
                        <span id="user-display-name">...</span>
                    </div>
                    <div class="header-actions">
                        <button id="btn-open-modal" class="dark-btn">+ Создать комнату</button>
                        <button id="btn-logout" class="icon-btn">🚪</button>
                    </div>
                </header>
                <div id="rooms-grid" class="rooms-grid"></div>
            </div>
        </section>

        <section id="room-screen" class="screen">
            <div class="room-layout">
                <div class="video-section glass-panel">
                    <div class="room-nav">
                        <button id="btn-leave-room" class="icon-btn">←</button>
                        <h2 id="current-room-name">...</h2>
                        <span id="admin-tag" class="hidden">HOST</span>
                    </div>
                    <div id="player-viewport">
                        <video id="main-video" playsinline></video>
                        <div id="sync-overlay" class="hidden"></div>
                    </div>
                </div>
                
                <div class="chat-section glass-panel">
                    <div class="online-list-wrapper">
                        <p>В комнате:</p>
                        <div id="online-users"></div>
                    </div>
                    <div id="chat-messages"></div>
                    <div class="chat-controls">
                        <div class="mic-wrapper">
                            <button id="btn-mic" class="mic-btn">🎤</button>
                        </div>
                        <input type="text" id="chat-input" placeholder="Сообщение...">
                        <button id="btn-send-msg">➤</button>
                    </div>
                </div>
            </div>
        </section>

        <div id="modal-create" class="modal-overlay">
            <div class="modal-content glass-panel">
                <h3>Новое пространство</h3>
                <input type="text" id="room-name" placeholder="Название">
                <input type="text" id="room-link" placeholder="Прямая ссылка (.mp4)">
                <input type="password" id="room-pass" placeholder="Пароль (если нужен)">
                <div class="modal-btns">
                    <button id="btn-close-modal" class="outline-btn">Отмена</button>
                    <button id="btn-create-finish" class="dark-btn">Запустить</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
