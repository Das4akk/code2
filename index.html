<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COWIO - Лобби</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-loading">
    <canvas id="particle-canvas"></canvas>

    <div class="lobby-layout screen">
        <!-- Твой Sidebar и Список комнат -->
        <aside id="main-sidebar" class="sidebar glass-panel">
            <div class="user-card" id="btn-my-profile">
                <div class="avatar" id="my-avatar">?</div>
                <div class="user-card-info">
                    <div id="my-name">Загрузка...</div>
                </div>
            </div>
            <!-- Навигация и друзья -->
        </aside>

        <main class="rooms-main">
            <header class="lobby-header glass-panel">
                <input type="text" id="search-rooms" placeholder="Поиск...">
                <button class="primary-btn" id="btn-open-create-room">Создать комнату</button>
            </header>
            <div class="rooms-grid" id="rooms-render-container"></div>
        </main>
    </div>

    <!-- Модалки (Профиль, Создание комнаты, Настройки профиля) -->
    <div class="modal" id="modal-create-room">...</div>
    <div class="modal" id="modal-profile">...</div>

    <div id="toast-container"></div>
    <div class="online-counter" id="global-online-count">В сети: 0</div>
    <script type="module" src="app.js"></script>
</body>
</html>
