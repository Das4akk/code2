<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COW — Co-Watching Space</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="loader" class="loader-overlay active"><div class="spinner"></div></div>
    <canvas id="particle-canvas"></canvas>

    <div id="app-container">
        <section id="auth-screen" class="screen">
            <div class="auth-wrapper glass-panel">
                <h1 class="logo">COW</h1>
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Вход</button>
                    <button id="tab-register">Регистрация</button>
                </div>
                <div class="form-container">
                    <div id="form-login" class="auth-form active-form">
                        <input type="email" id="login-email" placeholder="Email">
                        <input type="password" id="login-password" placeholder="Пароль">
                        <button id="btn-login-email" class="primary-btn">Войти</button>
                    </div>
                    <div id="form-register" class="auth-form hidden-form right">
                        <input type="text" id="reg-name" placeholder="Никнейм">
                        <input type="email" id="reg-email" placeholder="Email">
                        <input type="password" id="reg-password" placeholder="Пароль">
                        <button id="btn-register-email" class="primary-btn">Создать аккаунт</button>
                    </div>
                </div>
                <div class="divider"><span>или</span></div>
                <button id="btn-google-auth" class="google-btn">Войти через Google</button>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <div class="lobby-layout">
                <aside class="lobby-sidebar glass-panel">
                    <div class="user-profile">
                        <div class="avatar-circle"></div>
                        <h3 id="user-display-name">...</h3>
                    </div>
                    <nav class="sidebar-nav">
                        <button class="nav-btn active">Все комнаты</button>
                        <button id="btn-logout" class="nav-btn logout">Выход</button>
                    </nav>
                </aside>

                <main class="lobby-main">
                    <header class="main-header glass-panel">
                        <div class="search-wrapper">
                            <input type="text" id="search-rooms" placeholder="Поиск комнат...">
                        </div>
                        <button id="btn-open-modal" class="primary-btn create-btn">+ Создать</button>
                    </header>
                    <div id="rooms-grid" class="rooms-grid"></div>
                </main>
            </div>
        </section>

        <div id="modal-create" class="modal">
            <div class="modal-content glass-panel">
                <h2>Создать пространство</h2>
                <input type="text" id="room-name" placeholder="Название">
                <input type="text" id="room-link" placeholder="Прямая ссылка на .mp4 или YouTube">
                <div class="modal-buttons">
                    <button id="btn-close-modal" class="google-btn">Отмена</button>
                    <button id="btn-create-finish" class="primary-btn">Запустить</button>
                </div>
            </div>
        </div>

        <section id="room-screen" class="screen">
            <header class="room-header glass-panel">
                <div class="header-left">
                    <button id="btn-leave-room" class="icon-btn">✕</button>
                    <div class="room-meta">
                        <h2 id="room-title-text">Комната</h2>
                        <div id="users-online-list" class="presence-list"></div>
                    </div>
                </div>
                <div class="header-right">
                    <button id="btn-delete-room" class="danger-btn hidden">Удалить комнату</button>
                </div>
            </header>
            
            <main class="room-content">
                <div class="video-section">
                    <div class="player-wrapper glass-panel">
                        <video id="native-player" playsinline></video>
                        <div class="custom-controls">
                            <input type="range" id="video-volume" min="0" max="1" step="0.05" value="1">
                        </div>
                    </div>
                    <div class="voice-panel glass-panel">
                        <span class="label">Голос друзей:</span>
                        <input type="range" id="voice-volume" min="0" max="1" step="0.1" value="0.8">
                    </div>
                </div>

                <div class="chat-section glass-panel">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="input-container">
                        <div class="floating-input-bar glass-panel">
                            <button id="mic-btn" class="mic-btn">🎤</button>
                            <input type="text" id="chat-input" placeholder="Сообщение..." autocomplete="off">
                            <button id="send-btn" class="send-btn">↑</button>
                        </div>
                    </div>
                </div>
            </main>
        </section>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
