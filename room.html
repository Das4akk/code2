<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COWIO - Просмотр</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-loading">
    <canvas id="particle-canvas"></canvas>

    <div class="room-layout screen" id="room-screen">
        <div class="player-section">
            <div class="room-top-bar glass-panel">
                <button class="secondary-btn" onclick="window.location.href='lobby.html'">Назад</button>
                <h2 id="room-display-name">Загрузка...</h2>
            </div>
            <div class="video-container glass-panel" id="player-wrapper">
                <video id="main-video"></video>
            </div>
        </div>
        <aside class="chat-section glass-panel">
            <!-- Чат и список пользователей -->
        </aside>
    </div>

    <!-- Модалки комнаты (Настройки комнаты, Пароль) -->
    <div class="modal" id="modal-password">...</div>

    <div id="toast-container"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
